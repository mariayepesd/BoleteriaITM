version: '3.8'

services:
  # --- BASE DE DATOS SQL SERVER ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: itm_festival_sqlserver
    environment:
      SA_PASSWORD: "ITM_Festival_2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - festival_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'ITM_Festival_2026!' -Q 'SELECT 1' -No"]
      interval: 10s
      retries: 10
      start_period: 30s

  # --- MENSAJERÍA ASÍNCRONA (MassTransit + RabbitMQ) ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: itm_festival_rabbitmq
    ports:
      - "5672:5672"     # Puerto de comunicación AMQP
      - "15672:15672"   # Puerto de la UI de Administración
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - festival_network

  # --- CACHÉ DISTRIBUIDA (Price.Api) ---
  redis:
    image: redis:7-alpine
    container_name: itm_festival_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - festival_network

  # --- BUSCADOR INTELIGENTE: TEXTO (Search.Api) ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: itm_festival_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - festival_network

  # --- BUSCADOR INTELIGENTE: SEMÁNTICA IA (Search.Api) ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: itm_festival_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - festival_network

  # --- SERVICIO DE INVENTARIO (InventoryService) ---
  inventory-service:
    build:
      context: ./InventoryService   # <--- CORREGIDO: Contexto local directo
      dockerfile: Dockerfile        # <--- CORREGIDO: El archivo está adentro
    container_name: itm_festival_inventory_service
    ports:
      - "5273:8080"
      - "7198:8443"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=FestivalInventoryDb;User Id=sa;Password=ITM_Festival_2026!;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - festival_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"] # <--- CORREGIDO: Compatible con .NET
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- SERVICIO DE ÓRDENES (OrderService) ---
 # --- SERVICIO DE ÓRDENES (OrderService) ---
  order-service:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    container_name: itm_festival_order_service
    ports:
      - "5280:8080"
      - "7199:8443"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=FestivalOrdersDb;User Id=sa;Password=ITM_Festival_2026!;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - festival_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- SERVICIO DE NOTIFICACIONES (NotificationService) ---
  notification-service: # <--- CORREGIDO: Alineado perfectamente con dos espacios
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    container_name: itm_festival_notification_service
    ports:
      - "5290:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      - rabbitmq
    networks:
      - festival_network

  # --- PUERTA DE ENLACE (API Gateway con YARP) ---
  api-gateway:
    build:
      context: ./ApiGateway         # <--- CORREGIDO
      dockerfile: Dockerfile        # <--- CORREGIDO
    container_name: itm_festival_api_gateway
    ports:
      - "5000:8080"
      - "5001:8443"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
    depends_on:
      - inventory-service
      - order-service
    networks:
      - festival_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"] # <--- CORREGIDO
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

# --- RED INTERNA DEL ECOSISTEMA ---
networks:
  festival_network:
    driver: bridge

# --- VOLÚMENES PERSISTENTES ---
volumes:
  sqlserver_data:
  rabbitmq_data:
  redis_data:
  elasticsearch_data:
  qdrant_data: