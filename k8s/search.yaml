apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: festival
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
      - name: search-service
        image: DOCKERHUB_USER/boleteria-search:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: festival-config
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60   # necesita más tiempo para indexar
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: festival
spec:
  selector:
    app: search-service
  ports:
  - port: 8080
    targetPort: 8080
